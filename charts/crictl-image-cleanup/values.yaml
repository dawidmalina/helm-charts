# Default values for crictl-image-cleanup.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Image configuration for the cleanup DaemonSet
image:
  # Repository for base image with shell support
  # Alpine is used to download and install crictl binary at runtime
  repository: alpine
  tag: "3.19"
  pullPolicy: IfNotPresent

# crictl configuration
crictl:
  # Version of crictl to download and use
  # Should match or be compatible with Kubernetes version
  version: v1.31.1

# Cleanup command options
cleanup:
  # Run crictl rmi --prune to remove unused images
  prune: true
  # Additional arguments to pass to crictl rmi
  # Example: ["--all"] to remove all unused images
  extraArgs: []

# Node selector for scheduling the DaemonSet pods
# Example:
# nodeSelector:
#   kubernetes.io/os: linux
nodeSelector: {}

# Tolerations for scheduling the DaemonSet pods
# Allows the DaemonSet to run on nodes with specific taints
# Example:
# tolerations:
#   - key: "node-role.kubernetes.io/control-plane"
#     operator: "Exists"
#     effect: "NoSchedule"
tolerations: []

# Additional labels to add to the DaemonSet pods
podLabels: {}

# Additional annotations to add to the DaemonSet pods
podAnnotations: {}

# Security context for the pod
# Must run as root and be privileged to access crictl socket
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

# Security context for the container
# Privileged access is required to interact with container runtime
securityContext:
  privileged: true

# Resources for the cleanup container
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Service account configuration
serviceAccount:
  create: true
  name: ""
  # Annotations to add to the service account
  annotations: {}

# Host path for container runtime socket
# This is where the container runtime socket is located
# Common paths:
#   - /var/run/containerd/containerd.sock (containerd)
#   - /var/run/crio/crio.sock (CRI-O)
#   - /run/containerd/containerd.sock (some containerd installations)
runtimeSocket:
  # Path to the container runtime socket on the host
  path: /var/run/containerd/containerd.sock
  # Socket type (unix, tcp, etc.)
  type: unix

# Interval in seconds between cleanup runs
# Default: 86400 seconds (24 hours)
# Examples:
#   3600 = 1 hour
#   43200 = 12 hours
#   86400 = 24 hours (default)
cleanupInterval: 86400

# Update strategy for the DaemonSet
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
